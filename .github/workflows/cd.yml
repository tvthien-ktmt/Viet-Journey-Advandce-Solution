name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        working-directory: ./backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vietjourney-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vietjourney-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -f Dockerfile.frontend -t ${{ secrets.DOCKERHUB_USERNAME }}/vietjourney-frontend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vietjourney-frontend:latest
