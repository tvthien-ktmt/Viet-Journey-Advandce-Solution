server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vietjourney?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Do not use update since we are using Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    # 256-bit secret key for HMAC-SHA256 (e.g. 32 characters)
    secret: "VietJourneySecretKey1234567890123"
    expiration-ms: 86400000 # 24 hours
  cors:
    allowed-origins: "http://127.0.0.1:5500,http://localhost:5500"
