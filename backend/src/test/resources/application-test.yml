spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  cache:
    type: none
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-testing-only-not-production
    expiration-ms: 86400000
  payment:
    vnp-hash-secret: "MockPaymentSecretKey1234567890"
