# Chỉ bật ở môi trường dev
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      idle-timeout: 300000
      pool-name: DevHikariCP

logging:
  level:
    com.vietjourney.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
