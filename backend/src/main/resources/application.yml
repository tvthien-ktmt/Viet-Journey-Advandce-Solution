server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
  http2:
    enabled: true

spring:
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: jdbc:mysql://localhost:3306/vietjourney?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:vietjourney_web}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: validate # Do not use update since we are using Flyway
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    # 256-bit secret key for HMAC-SHA256 (e.g. 32 characters)
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000} # 15 minutes
  payment:
    vnp-hash-secret: ${VNP_HASH_SECRET}
    vnp-tmn-code: ${VNP_TMN_CODE:DEMO1234}
    vnp-pay-url: ${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    vnp-return-url: ${VNP_RETURN_URL:http://localhost:5173/payments/callback}
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500"
